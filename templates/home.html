<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Gastos</title>
</head>
<body>
    
    <form action="/cadastro" method="GET">
        <h1>GASTO</h1>
        <input type="text" name="nome_gasto" class="ipt" placeholder="Nome do Gasto">
        <input type="text" name="valor_gasto" class="ipt" placeholder="Valor do Gasto">
        <input type="text" name="nome_mes" class="ipt" placeholder="Nome do mes">
        <input type="text" name="salario" class="ipt" placeholder="Valor do salario">
        <button type="submit" class="btn">Enviar</button>
        <button type="button" class="btn"><a href="/deletar-gastos" >Limpar gastos</a></button>
        <button type="button" class="btn"><a href="/deletar-um-gasto" >Deletar um Gasto</a></button>
    </form>
    <table border=1>
        <tr><th>TABELA MÊS</th></tr>
        <tr><!--CRIA UMA LINHA NA TABELA-->
            {% for mes in tabela_mes  %}
                <th>
                    {{ mes | map('default', '') | map('string') | join(', ') }}
                </th><!--CABEÇALHO DAS COLUNAS-->
            {% endfor %}
        </tr>
        <tr>
            {%for salario in tabela_salario%}
            <td>
                {{ salario| map('default', '') | map('string') | join(', ') }}
            </td><!--CELULA DAS COLUNAS-->
            {%endfor%}
        </tr>
    </table>
</body>
</html>
